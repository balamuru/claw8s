name: resource_pressure
description: "Detect and remediate pods failing due to insufficient CPU/Memory or OOM kills."
triggers:
  - FailedScheduling
  - OOMKilled
  - BackOff

steps:
  - id: describe
    tool: describe_pod
    args:
      name: "{{ incident.object_name }}"
      namespace: "{{ incident.namespace }}"

  - id: get_spec
    tool: get_deployment
    args:
      name: "{{ incident.object_name }}"
      namespace: "{{ incident.namespace }}"

  - id: classify
    llm_classify:
      inputs: [describe, get_spec]
      categories:
        oom_killed: "Pod was terminated due to OOM (Out Of Memory). Look for 'OOMKilled' in container states or 'reason: OOMKilled'."
        insufficient_resources: "Pod cannot be scheduled due to insufficient CPU or Memory in the cluster. Look for 'FailedScheduling' events with 'Insufficient memory' or 'Insufficient cpu'."
        potential_leak: "Pod is healthy now but shows a steady climb in memory usage or frequent restarts. (Not currently actionable, just monitoring)."
        unknown: "The failure reason is not clearly related to resource pressure."

  - id: act
    switch: "{{ classify }}"
    cases:
      oom_killed:
        tool: patch_deployment
        args:
          name: "{{ incident.object_name }}"
          namespace: "{{ incident.namespace }}"
          patch: 
            spec:
              template:
                spec:
                  containers:
                    - name: "nginx"
                      resources:
                        limits:
                          memory: "512Mi"
          reason: "Automated OOMKill remediation via Runbook"
      insufficient_resources:
        tool: list_pods
        args:
          namespace: "{{ incident.namespace }}"
        # Now that we have the list, fall back to the agent with the context pre-loaded
        inconclusive: true
        findings: "Cluster is reporting insufficient resources. Here is the current pod list for the namespace to help identify candidates for eviction or scaling down."
      potential_leak:
        summary: "Resource usage for `{{ incident.object_name }}` is high but within limits. Monitoring for memory leaks."
      unknown:
        inconclusive: true
