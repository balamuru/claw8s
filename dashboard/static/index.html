<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw8s | Autonomous K8s Dashboard</title>
    <link rel="icon" href="https://raw.githubusercontent.com/google/material-design-icons/master/png/action/security/ios/icon_apple_60pt_2x.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <h1>Claw8s <span class="badge">Autonomous</span></h1>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">System Status</span>
                    <span class="stat-value pulse">Active</span>
                </div>
            </div>
        </header>

        <main>
            <section class="analytics">
                <div class="section-header">
                    <h2>Incident Frequency</h2>
                    <select id="bucket-select" class="select-sm">
                        <option value="15">15m buckets</option>
                        <option value="60" selected>1h buckets</option>
                        <option value="1440">1d buckets</option>
                    </select>
                </div>
                <div id="histogram-container" class="histogram">
                    <!-- Histogram bars will be injected here -->
                </div>
            </section>

            <section class="incident-list">
                <div class="section-header">
                    <h2>Recent Incidents</h2>
                    <div class="header-actions">
                        <button id="clear-btn" class="btn-danger" onclick="clearIncidents()">Clear History</button>
                        <button id="refresh-btn" class="btn-secondary">Refresh</button>
                    </div>
                </div>
                <div id="incidents-container" class="grid">
                    <!-- Incidents will be injected here -->
                    <div class="loading">Analyzing cluster state...</div>
                </div>
            </section>

            <section id="detail-view" class="detail-panel hidden">
                <div class="panel-content">
                    <header class="panel-header">
                        <h3>Incident Details</h3>
                        <button id="close-detail" class="btn-close">&times;</button>
                    </header>
                    <div id="action-history" class="timeline">
                        <!-- Actions will be injected here -->
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
